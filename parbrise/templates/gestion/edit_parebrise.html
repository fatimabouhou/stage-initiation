{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>Modifier le pare-brise</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.code_sap.id_for_label }}" class="form-label">Code SAP</label>
            {{ form.code_sap }}
        </div>
        <div class="mb-3">
            <label for="{{ form.version.id_for_label }}" class="form-label">Version</label>
            {{ form.version }}
        </div>
        <div class="mb-3">
            <label for="{{ form.logo_reference.id_for_label }}" class="form-label">Logo de référence</label>
            {{ form.logo_reference }}
            {% if form.instance.logo_reference %}
                <div class="mt-2">
                    <img src="{{ form.instance.logo_reference.url }}" alt="Logo actuel" style="max-height: 100px;">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="logo_reference-clear" id="logo_reference-clear">
                        <label class="form-check-label" for="logo_reference-clear">Supprimer l'image actuelle</label>
                    </div>
                </div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'liste_parebrises' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
