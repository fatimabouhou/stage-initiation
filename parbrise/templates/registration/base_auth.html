{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Saint-Gobain Sekurit - {% block title %}{% endblock %}</title>
  <link href="{% static 'bootstrap/css/bootstrap.min.css' %}" rel="stylesheet" />
  <link href="{% static 'bootstrap/css/auth.css' %}" rel="stylesheet" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <img src="{% static 'registration/logo.png' %}" alt="Saint-Gobain Sekurit" class="auth-logo" />
      </div>
     
      {% block content %}{% endblock %}
    </div>
  </div>
  <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
